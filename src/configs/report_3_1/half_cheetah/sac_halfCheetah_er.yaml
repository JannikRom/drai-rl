# ===============================================================
# SAC — Report Half-Cheetah
# Soft Actor-Critic
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: "sac_HalfCheetah_er"
seed: 3

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "sac"
env_name: "HalfCheetah-v5"
# if Hockey-v0:
# mode: "NORMAL" # "NORMAL", "TRAIN_SHOOTING", "TRAIN_DEFENSE"
# opponent: "weak" # "weak", "strong", null for selfplay

# ---------------------------------------------------------------
# Reward Shaping
# ---------------------------------------------------------------
# reward_shaping:
#   touch_puck: 0.5
#   puck_direction: 0.5
#   closeness_to_puck: 0.0
#   time_penalty: 0.2
#   defensive_distance: 0.05

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.99
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [256, 256, 256]
critic_hidden_sizes: [256, 256, 256]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 3.0e-4
critic_lr: 3.0e-4
alpha_lr: 1.0e-4

# ---------------------------------------------------------------
# SAC Specific
# ---------------------------------------------------------------
alpha: 0.2 # Initial entropy coefficient
target_entropy: "auto" # "auto" → -action_dim, or pass a float

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 1_000_000
buffer_type: "er" # "er" or "per"
# if PER:
# per_alpha: 0.6
# per_epsilon: 1.0e-6
# per_beta_start: 0.4
# per_annealing_pct: 0.8

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "standard" # "standard" or "selfplay"
total_timesteps: 800_000
learning_starts: 5_000
batch_size: 256

# if selfplay:
# pool_max_size: 20
# pool_update_interval: 500
# pool_update_check_window: 100
# pool_update_eval_episodes: 10
# pool_update_win_rate_threshold: 0.55
# pool_strong_bot_prob: 0.7
# pool_snapshot_prob: 0.5
#pool_recency_bias: 2

# ---------------------------------------------------------------
# Saving
# ---------------------------------------------------------------
log_dir: "./logs/report_3_1/HalfCheetah"
save_interval: 200_000
eval_interval: 500
eval_episodes: 20

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging:
  # TensorBoard scalar intervals (in timesteps)
  loss_every_steps: 100
  per_beta_every_steps: 100

  # Console print interval (in episodes)
  print_every_episodes: 10

  # Moving-average window for console + TensorBoard
  avg_window: 10

  # Which scalar groups to write to TensorBoard
  log_losses: true
  log_per: false # set true if buffer_type: "per"
  log_sac: true # SAC-specific scalars (alpha, entropy)
  log_eval: true
  log_pool: false # set true if training_mode: "selfplay"

  # Artefacts saved at end of training
  save_reward_plot: true
  save_numpy_arrays: true
  save_config_yaml: true
