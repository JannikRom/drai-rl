# ===============================================================
# TD3 — Template
# Twin Delayed Deep Deterministic Policy Gradient
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: ""
seed: 42

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "td3"
env_name: ""
# if Hockey-v0:
# mode: "NORMAL"          # "NORMAL", "TRAIN_SHOOTING", "TRAIN_DEFENSE"
# opponent: "weak"        # "weak", "strong", null for selfplay

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.99
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [256, 256]
critic_hidden_sizes: [256, 256]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 3.0e-4
critic_lr: 3.0e-4

# ---------------------------------------------------------------
# TD3 Specific
# ---------------------------------------------------------------
policy_noise: 0.2 # Gaussian noise added to target policy actions
noise_clip: 0.5 # Clipping range for target policy noise
policy_delay: 2 # Actor update frequency (every N critic updates)

# Exploration noise
noise_type: "white" # "white" or "pink"
noise_scale: 0.1
# if pink noise:
# pink_beta: 1.0

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 1_000_000
buffer_type: "er" # "er" or "per"
# if PER:
# per_alpha: 0.6
# per_epsilon: 1.0e-6
# per_beta_start: 0.4
# per_annealing_pct: 0.8

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "standard" # "standard" or "selfplay"
total_timesteps: 1_000_000
learning_starts: 10_000
batch_size: 256

# if selfplay:
# pool_max_size: 20
# pool_update_interval: 500
# pool_update_check_window: 100
# pool_update_eval_episodes: 10
# pool_update_win_rate_threshold: 0.55

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
log_dir: "./logs"
save_interval: 50_000
eval_interval: 50_000
eval_episodes: 10
