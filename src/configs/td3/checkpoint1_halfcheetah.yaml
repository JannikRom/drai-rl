# ===============================================================
# TD3 — Checkpoint 1 — HalfCheetah-v4
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: "checkpoint1_halfcheetah_td3"
seed: 42

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "td3"
env_name: "HalfCheetah-v5"

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.99
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [256, 256]
critic_hidden_sizes: [256, 256]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 3.0e-4
critic_lr: 3.0e-4

# ---------------------------------------------------------------
# TD3 Specific
# ---------------------------------------------------------------
policy_noise: 0.2
noise_clip: 0.5
policy_delay: 2

noise_type: "white"
noise_scale: 0.1

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 1_000_000
buffer_type: "er"

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "standard"
total_timesteps: 1_000_000
learning_starts: 10_000
batch_size: 256

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
log_dir: "./logs/td3"
save_interval: 100_000
eval_interval: 50_000
eval_episodes: 5
