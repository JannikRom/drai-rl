# ===============================================================
# TD3 — Checkpoint 4 — Self-Play
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: "checkpoint4_selfplay_td3"
seed: 42

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "td3"
env_name: "Hockey-v0"
mode: "NORMAL"
opponent: null

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.99
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [256, 256]
critic_hidden_sizes: [256, 256]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 3.0e-4
critic_lr: 1.0e-3

# ---------------------------------------------------------------
# TD3 Specific
# ---------------------------------------------------------------
policy_noise: 0.2
noise_clip: 0.8
policy_delay: 2

# Exploration noise
noise_type: "pink"
noise_scale: 0.1
pink_beta: 1.0

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 1_000_000
buffer_type: "er"

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "selfplay"
total_timesteps: 1_000_000
learning_starts: 10_000
batch_size: 256

# Self-Play Pool
pool_max_size: 20
pool_update_interval: 500
pool_update_check_window: 100
pool_update_eval_episodes: 10
pool_update_win_rate_threshold: 0.55

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
log_dir: "./logs/td3"
save_interval: 50_000
eval_interval: 25_000
eval_episodes: 10
