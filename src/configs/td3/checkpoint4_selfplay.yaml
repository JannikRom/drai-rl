# ===============================================================
# TD3 — Checkpoint 4 — Self-Play
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: "checkpoint4_selfplay_td3"
seed: 3

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "td3"
env_name: "Hockey-v0"
mode: "NORMAL"
opponent: null

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.99
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [256, 256]
critic_hidden_sizes: [256, 256]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 3.0e-4
critic_lr: 1.0e-3

# ---------------------------------------------------------------
# TD3 Specific
# ---------------------------------------------------------------
policy_noise: 0.2
noise_clip: 0.8
policy_delay: 2

# Exploration noise
noise_type: "pink"
noise_scale: 0.1
pink_beta: 1.0

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 1_000_000
buffer_type: "er"

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "selfplay"
total_timesteps: 2_000_000
learning_starts: 10_000
batch_size: 256

# Self-Play Pool
pool_max_size: 10
pool_update_interval: 500
pool_update_check_window: 100
pool_update_eval_episodes: 10
pool_update_win_rate_threshold: 0.55
pool_strong_bot_prob: 0.8
pool_snapshot_prob: 0.5
pool_recency_bias: 2.0

# ---------------------------------------------------------------
# Saving
# ---------------------------------------------------------------
log_dir: "./logs/td3"
save_interval: 50_000
eval_interval: 25_000
eval_episodes: 10

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging:
  loss_every_steps: 100
  per_beta_every_steps: 100
  print_every_episodes: 10
  avg_window: 10
  log_losses: true
  log_per: false
  log_sac: false
  log_eval: true
  log_pool: true
  save_reward_plot: true
  save_numpy_arrays: true
  save_config_yaml: true
