# Checkpoint 2: Hockey Training - Shooting Mode
experiment_name: "checkpoint2_hockey_defending_td3"
seed: 42

# Environment
env_name: "Hockey-v0"
mode: "TRAIN_DEFENSE" # Static ball, static opponent - learn to shoot
opponent: null # Not needed in training modes

# Training
total_timesteps: 200_000
learning_starts: 5_000
batch_size: 256
replay_capacity: 100_000

# Logging
log_dir: "./logs/td3"
save_interval: 20_000
eval_interval: 20_000
eval_episodes: 10

# Agent
agent_type: "td3"
gamma: 0.99
tau: 0.005

# TD3 specific
actor_lr: 0.0003
critic_lr: 0.001
hidden_dim: 256
policy_delay: 2
noise_std: 0.1
policy_noise: 0.2
noise_clip: 0.5
