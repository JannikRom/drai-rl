# configs/checkpoint1_lunarlander.yaml
# Checkpoint 1: Verify TD3 works on LunarLanderContinuous-v2

experiment_name: checkpoint1_lunarlander_td3
seed: 42

env_name: LunarLanderContinuous-v3
mode: null
opponent: null
reward_shaping: {}

agent_type: td3
gamma: 0.99
tau: 0.005

# TD3-specific parameters
hidden_dim: 256
actor_lr: 0.0003
critic_lr: 0.0003
policy_delay: 2
noise_std: 0.1
policy_noise: 0.2
noise_clip: 0.5

# Training (LunarLander needs more timesteps)
total_timesteps: 500000
learning_starts: 10000
batch_size: 256
replay_capacity: 500000

# Logging
log_dir: ./logs/td3
save_interval: 50000
eval_interval: 25000
eval_episodes: 5
