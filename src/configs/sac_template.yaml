# ===============================================================
# SAC — Template
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: ""
seed: 42

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "sac"
env_name: ""
# if Hockey-v0:
# mode: "NORMAL"          # "NORMAL", "TRAIN_SHOOTING", "TRAIN_DEFENSE"
# opponent: "weak"        # "weak", "strong", null for selfplay

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.99
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [256, 256]
critic_hidden_sizes: [256, 256]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 3.0e-4
critic_lr: 3.0e-4
alpha_lr: 3.0e-4

# ---------------------------------------------------------------
# SAC Specific
# ---------------------------------------------------------------
alpha: 0.2 # Initial entropy coefficient
target_entropy: "auto" # "auto" → -action_dim, or pass a float

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 1_000_000
buffer_type: "er" # "er" or "per"
# if PER:
# per_alpha: 0.6
# per_epsilon: 1.0e-6
# per_beta_start: 0.4
# per_annealing_pct: 0.8

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "standard" # "standard" or "selfplay"
total_timesteps: 1_000_000
learning_starts: 10_000
batch_size: 256

# if selfplay:
# pool_max_size: 20
# pool_update_interval: 500
# pool_update_check_window: 100
# pool_update_eval_episodes: 10
# pool_update_win_rate_threshold: 0.55

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
log_dir: "./logs"
save_interval: 50_000
eval_interval: 50_000
eval_episodes: 10
