# Checkpoint 3: Hockey Normal Mode vs Strong Opponent
experiment_name: "checkpoint3_hockey_strong_sac_per_custom_reward"
seed: 42

# Environment
env_name: "Hockey-v0"
mode: "NORMAL"
opponent: "strong"

# Training
total_timesteps: 400_000
learning_starts: 10_000
batch_size: 256
replay_capacity: 400_000

# Reward Shaping
reward_shaping:
  touch_puck: 0.5
  puck_direction: 0.5
  closeness_to_puck: 0.0
  time_penalty: 0.2
  defensive_distance: 0.05

# Logging
log_dir: "./logs/sac"
save_interval: 100_000
eval_interval: 50_000
eval_episodes: 20

# Agent
agent_type: "sac"
gamma: 0.99
tau: 0.005
alpha: 0.8
alpha_lr: 0.0001

# Buffer
buffer_type: "per"
per_alpha: 0.6
per_beta_start: 0.4
per_annealing_pct: 0.8

# SAC Networks
actor_lr: 0.0003
critic_lr: 0.0003
hidden_dim: 256
