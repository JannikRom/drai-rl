# ===============================================================
# SAC — Checkpoint 1 — Pendulum-v1 (PER)
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: "checkpoint1_pendulum_sac_per2"
seed: 42

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "sac"
env_name: "Pendulum-v1"
mode: null
opponent: null

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.99
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [256, 256]
critic_hidden_sizes: [256, 256]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 3.0e-4
critic_lr: 3.0e-4
alpha_lr: 3.0e-4

# ---------------------------------------------------------------
# SAC Specific
# ---------------------------------------------------------------
alpha: 0.2
target_entropy: "auto"

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 100_000
buffer_type: "per"
per_alpha: 0.6
per_epsilon: 1.0e-6
per_beta_start: 0.4
per_annealing_pct: 0.8

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "standard"
total_timesteps: 80_000
learning_starts: 5_000
batch_size: 128

# ---------------------------------------------------------------
# Saving
# ---------------------------------------------------------------
log_dir: "./logs/sac"
save_interval: 25_000
eval_interval: 10_000
eval_episodes: 5

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging:
  loss_every_steps: 100
  per_beta_every_steps: 100
  print_every_episodes: 10
  avg_window: 10
  log_losses: true
  log_per: true
  log_sac: true
  log_eval: true
  log_pool: false
  save_reward_plot: true
  save_numpy_arrays: true
  save_config_yaml: true
