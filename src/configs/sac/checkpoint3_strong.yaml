# ===============================================================
# SAC — Checkpoint 3 — Hockey Normal Mode vs Strong Opponent (PER)
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: "checkpoint3_hockey_strong_sac_per"
seed: 42

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "sac"
env_name: "Hockey-v0"
mode: "NORMAL"
opponent: "strong"

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.99
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [256, 256]
critic_hidden_sizes: [256, 256]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 3.0e-4
critic_lr: 3.0e-4
alpha_lr: 3.0e-4

# ---------------------------------------------------------------
# SAC Specific
# ---------------------------------------------------------------
alpha: 0.2
target_entropy: "auto"

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 500_000
buffer_type: "per"
per_alpha: 0.6
per_epsilon: 1.0e-6
per_beta_start: 0.4
per_annealing_pct: 0.8

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "standard"
total_timesteps: 2_000_000
learning_starts: 10_000
batch_size: 256

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
log_dir: "./logs/sac"
save_interval: 100_000
eval_interval: 50_000
eval_episodes: 20
