experiment_name: report_sac_reward_shaping
seed: 3
env_name: Hockey-v0
mode: NORMAL
opponent: strong
reward_shaping:
  touch_puck: 0.4
  puck_direction: 0.3
  closeness_to_puck: 0.0
  time_penalty: 0.2
  defensive_distance: 0.01
agent_type: sac
gamma: 0.99
tau: 0.005
total_timesteps: 2500000
learning_starts: 10000
batch_size: 256
replay_capacity: 1000000
log_dir: ./logs_report/2_2/sac_reward_shaping
save_interval: 1000000
eval_interval: 10000
eval_episodes: 100
actor_hidden_sizes:
- 256
- 256
critic_hidden_sizes:
- 256
- 256
actor_lr: 0.0003
critic_lr: 0.0003
alpha_lr: 0.0001
alpha: 0.2
target_entropy: auto
buffer_type: er
