# ===============================================================
# SAC — Final team agent, fintetune config
# Soft Actor-Critic
# ===============================================================

# ---------------------------------------------------------------
# Experiment
# ---------------------------------------------------------------
experiment_name: "fine_tune_v3"
seed: 3

# ---------------------------------------------------------------
# Environment
# ---------------------------------------------------------------
agent_type: "sac"
env_name: "Hockey-v0"
# if Hockey-v0:
mode: "NORMAL" # "NORMAL", "TRAIN_SHOOTING", "TRAIN_DEFENSE"
opponent: null # "weak", "strong", null for selfplay

# ---------------------------------------------------------------
# Reward Shaping
# ---------------------------------------------------------------
reward_shaping:
  touch_puck: 0.1
  puck_direction: 0.05
#   closeness_to_puck: 0.0
#   time_penalty: 0.2
#   defensive_distance: 0.05

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
gamma: 0.98
tau: 0.005

# ---------------------------------------------------------------
# Network Architecture
# ---------------------------------------------------------------
actor_hidden_sizes: [512, 256]
critic_hidden_sizes: [512, 256, 128]

# ---------------------------------------------------------------
# Learning Rates
# ---------------------------------------------------------------
actor_lr: 1.0e-4
critic_lr: 1.0e-4
alpha_lr: 1.0e-4

# ---------------------------------------------------------------
# SAC Specific
# ---------------------------------------------------------------
alpha: 0.2 # Initial entropy coefficient
target_entropy: "auto" # "auto" → -action_dim, or pass a float

# ---------------------------------------------------------------
# Replay Buffer
# ---------------------------------------------------------------
replay_capacity: 1_000_000
buffer_type: "er" # "er" or "per"
# if PER:
# per_alpha: 0.6
# per_epsilon: 1.0e-6
# per_beta_start: 0.4
# per_annealing_pct: 0.8

# ---------------------------------------------------------------
# Training
# ---------------------------------------------------------------
training_mode: "selfplay" # "standard" or "selfplay"
use_fixed_opponent: False
use_fixed_opponent_pool: True

total_timesteps: 1_500_000
learning_starts: 10_000
batch_size: 256

# if selfplay:
pool_max_size: 3
pool_update_interval: 10_000
pool_update_check_window: 100
pool_update_eval_episodes: 20
pool_update_win_rate_threshold: 0.70
pool_strong_bot_prob: 0.5
pool_snapshot_prob: 0.5
pool_recency_bias: 2

# ---------------------------------------------------------------
# Saving
# ---------------------------------------------------------------
log_dir: "./logs/fine_tune/"
save_interval: 100_000
eval_interval: 25_000
eval_episodes: 20

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging:
  # TensorBoard scalar intervals (in timesteps)
  loss_every_steps: 100
  per_beta_every_steps: 100

  # Console print interval (in episodes)
  print_every_episodes: 500

  # Moving-average window for console + TensorBoard
  avg_window: 50

  # Which scalar groups to write to TensorBoard
  log_losses: true
  log_per: false # set true if buffer_type: "per"
  log_sac: true # SAC-specific scalars (alpha, entropy)
  log_eval: true
  log_pool: true # set true if training_mode: "selfplay"

  # Artefacts saved at end of training
  save_reward_plot: true
  save_numpy_arrays: true
  save_config_yaml: true
